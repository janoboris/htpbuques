<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HTP · Control de Transferencia</title>
<link rel="stylesheet" href="htp-style.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; min-height: 100vh; }

  .brand-block { text-align: center; margin-bottom: 36px; }
  .crest-card {
    display: inline-block; background: #ffffff; border-radius: var(--radius-lg);
    padding: 22px 30px; box-shadow: 0 12px 32px rgba(0,0,0,0.35);
  }
  .crest { width: 240px; max-width: 100%; display: block; }

  .estado-buque {
    width: 100%; max-width: 420px; margin-bottom: 26px;
    background: var(--bg-panel); border: 1px solid var(--border-soft); border-radius: var(--radius-md);
    padding: 14px 18px;
  }
  .estado-buque .flag { display:flex; align-items:center; gap:8px; font-size: 12.5px; font-weight: 700; margin-bottom: 4px; }
  .estado-buque .flag.on { color: var(--ok); }
  .estado-buque .flag.off { color: var(--warn); }
  .estado-buque p { font-size: 13px; color: var(--ink-dim); }
  .estado-buque .mono-line { font-family: var(--font-mono); font-size: 13px; color: var(--ink-bright); margin-top: 4px; }

  .perfiles { display: grid; grid-template-columns: 1fr; gap: 14px; width: 100%; max-width: 420px; }
  .perfil-btn {
    background: var(--bg-panel); border: 1.5px solid var(--border-soft); border-radius: var(--radius-lg);
    padding: 22px 22px; text-align: left; cursor: pointer; color: var(--ink); display: flex; align-items: center; gap: 16px;
    transition: border-color .2s, transform .15s;
  }
  .perfil-btn:active { transform: scale(0.98); }
  .perfil-btn:hover { border-color: var(--forge); }
  .perfil-btn .ic {
    width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .perfil-btn.gerencia .ic { background: rgba(76,158,224,0.14); }
  .perfil-btn.supervisor .ic { background: rgba(232,112,62,0.14); }
  .perfil-btn.tarja .ic { background: rgba(47,184,114,0.14); }
  .perfil-btn .tx .name { font-size: 17px; font-weight: 700; color: var(--ink-bright); }
  .perfil-btn .tx .desc { font-size: 12.5px; color: var(--ink-dim); margin-top: 3px; line-height: 1.4; }

  .footer-note { margin-top: 34px; text-align: center; font-size: 11.5px; color: var(--ink-faint); }

  .nombre-form .field { margin-bottom: 16px; }
  @media (min-width: 768px) { .perfiles { grid-template-columns: repeat(3, 1fr); max-width: 900px; } }
</style>
</head>
<body>

<div class="brand-block">
  <div class="crest-card">
    <img class="crest" src="htp-logo.jpg" alt="HTP - Huachipato Terminal Portuario">
  </div>
</div>

<div class="estado-buque" id="estadoBuque">
  <div class="flag off" id="flagConexion">● Conectando…</div>
  <p id="resumenBuque">Buscando buque activo…</p>
</div>

<div class="perfiles">
  <div class="perfil-btn gerencia" onclick="HTPLogin.elegir('gerencia')">
    <div class="ic">📊</div>
    <div class="tx">
      <div class="name">Gerencia</div>
      <div class="desc">Monitoreo, KPIs e histórico de buques</div>
    </div>
  </div>
  <div class="perfil-btn supervisor" onclick="HTPLogin.elegir('supervisor')">
    <div class="ic">🧭</div>
    <div class="tx">
      <div class="name">Supervisor</div>
      <div class="desc">Crea buques, flota, detenciones y aprueba cierres</div>
    </div>
  </div>
  <div class="perfil-btn tarja" onclick="HTPLogin.elegir('tarja')">
    <div class="ic">📝</div>
    <div class="tx">
      <div class="name">Tarja</div>
      <div class="desc">Registra camiones y avance de turno en terreno</div>
    </div>
  </div>
</div>

<div class="footer-note">HTP · Sistema de Control de Transferencia · datos sincronizados en tiempo real</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="htp-core.js"></script>
<script>
HTP.init();

HTP.onLiveChange(on => {
  const f = document.getElementById('flagConexion');
  f.className = 'flag ' + (on ? 'on' : 'off');
  f.textContent = on ? '● Sincronizado en vivo' : '● Sin conexión — usando último dato local';
});

HTP.listenBuques(buques => {
  const activos = buques.filter(b => b.estado === 'abierto' || b.estado === 'gira');
  const p = document.getElementById('resumenBuque');
  if (!activos.length) {
    p.innerHTML = '⚠️ No hay buque activo. El supervisor debe configurar uno primero.';
    return;
  }
  const b = activos[0];
  const ton = HTP.totalToneladas(b);
  const objetivo = Object.values(b.bodegas).reduce((s, x) => s + (Number(x.tonObjetivo) || 0), 0);
  const pct = objetivo > 0 ? (ton / objetivo * 100).toFixed(1) : '0.0';
  p.innerHTML = `🚢 <strong style="color:var(--ink-bright)">${b.nombre} ${b.voyage || ''}</strong>` +
    (b.estado === 'gira' ? ' <span class="badge badge-warn" style="margin-left:4px;">En gira</span>' : '') +
    `<span class="mono-line">${HTP.fmtTon(ton)} / ${HTP.fmtTon(objetivo)} MT · ${pct}%</span>`;
});

const HTPLogin = {
  elegir(perfil) {
    const actual = HTP.getUsuario();
    if (actual && actual.nombre) {
      HTP.setUsuario(actual.nombre, perfil);
      location.href = perfil + '.html';
      return;
    }
    HTP.openModal(`
      <div class="modal-head"><h3>¿Quién eres?</h3><button class="modal-close" onclick="HTP.closeModal()">✕</button></div>
      <div class="nombre-form">
        <div class="field"><label>Tu nombre</label><input id="inNombre" placeholder="Ej: Juan Pérez" autofocus></div>
        <button class="btn btn-accent btn-block" onclick="HTPLogin.confirmar('${perfil}')">Ingresar como ${perfil}</button>
      </div>
    `);
  },
  confirmar(perfil) {
    const nombre = document.getElementById('inNombre').value.trim();
    if (!nombre) { HTP.toast('Ingresa tu nombre', 'bad'); return; }
    HTP.setUsuario(nombre, perfil);
    location.href = perfil + '.html';
  }
};
</script>
</body>
</html>
